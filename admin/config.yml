backend:
  name: git-gateway
  branch: master

media_folder: "."
public_folder: "."

locale: nl

collections:
  - name: "site"
    label: "Website"
    files:
      - name: "content"
        label: "Alle instellingen"
        file: "content.json"
        format: json
        fields:

          - label: "Stijl"
            name: "stijl"
            widget: "object"
            fields:
              - label: "Kleurthema"
                name: "kleur_thema"
                widget: "select"
                options:
                  - { label: "Groen (standaard)", value: "groen" }
                  - { label: "Blauw", value: "blauw" }
                  - { label: "Terracotta", value: "terracotta" }
                  - { label: "Lavendel", value: "lavendel" }
                  - { label: "Zand", value: "zand" }
              - label: "Lettertype koppen"
                name: "kop_lettertype"
                widget: "select"
                options:
                  - { label: "Cormorant Garamond – elegant (standaard)", value: "Cormorant Garamond" }
                  - { label: "Playfair Display – klassiek", value: "Playfair Display" }
                  - { label: "Lora – warm & leesbaar", value: "Lora" }
                  - { label: "DM Serif Display – modern", value: "DM Serif Display" }
              - label: "Lettertype tekst"
                name: "tekst_lettertype"
                widget: "select"
                options:
                  - { label: "DM Sans – vriendelijk (standaard)", value: "DM Sans" }
                  - { label: "Inter – strak", value: "Inter" }
                  - { label: "Nunito – zacht", value: "Nunito" }
                  - { label: "Source Sans – zakelijk", value: "Source Sans 3" }

          - label: "Secties tonen / verbergen"
            name: "secties"
            widget: "object"
            fields:
              - { label: "Herken jij dit? (klachten)", name: "over", widget: "boolean", default: true }
              - { label: "Eerlijke quote sectie", name: "quote-eerlijk", widget: "boolean", default: true }
              - { label: "Uitleg sectie", name: "uitleg", widget: "boolean", default: true }
              - { label: "Wil je... sectie", name: "traject", widget: "boolean", default: true }
              - { label: "4 Fases", name: "fases", widget: "boolean", default: true }
              - { label: "Traject & investering", name: "investering", widget: "boolean", default: true }
              - { label: "Je bent klaar als je...", name: "klaar", widget: "boolean", default: true }
              - { label: "Kennismaken (onderaan)", name: "kennismaken", widget: "boolean", default: true }

          - label: "Afbeeldingen"
            name: "afbeeldingen"
            widget: "object"
            fields:
              - { label: "Foto bij klachten sectie", name: "herkenning_foto", widget: "image" }
              - { label: "Foto bij 'Wil je...' sectie", name: "wilje_foto", widget: "image" }
              - { label: "Foto Fase 1", name: "fase1_foto", widget: "image" }

          - label: "Hero (bovenste blok)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Label boven titel", name: "eyebrow", widget: "string" }
              - { label: "Titel regel 1", name: "titel1", widget: "string" }
              - { label: "Titel regel 2", name: "titel2", widget: "string" }
              - { label: "Ondertitel", name: "subtitel", widget: "text" }

          - label: "Herken jij dit? (klachtenlijst)"
            name: "herkenning"
            widget: "object"
            fields:
              - { label: "Introtekst", name: "lead", widget: "text" }
              - label: "Klachten"
                name: "klachten"
                widget: "list"
                field: { label: "Klacht", name: "item", widget: "string" }
              - { label: "Afsluitende zin", name: "afsluiting", widget: "string" }

          - label: "Eerlijke quote sectie"
            name: "quote_eerlijk"
            widget: "object"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Tussenregel", name: "source", widget: "string" }
              - { label: "Tekst eronder", name: "tekst", widget: "text" }

          - { label: "Groene blok tekst", name: "quote_groen", widget: "text" }
          - { label: "Quote (darmen/hormonen)", name: "quote_darmen", widget: "text" }

          - label: "Uitleg sectie"
            name: "uitleg"
            widget: "object"
            fields:
              - { label: "Alinea 1", name: "tekst1", widget: "text" }
              - { label: "Alinea 2", name: "tekst2", widget: "text" }

          - label: "Wil je... (lijst)"
            name: "wilje"
            widget: "list"
            field: { label: "Punt", name: "item", widget: "string" }

          - label: "4 Fases"
            name: "fases"
            widget: "object"
            fields:
              - label: "Fase 1"
                name: "fase1"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Fase 2"
                name: "fase2"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Fase 3"
                name: "fase3"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }
              - label: "Fase 4"
                name: "fase4"
                widget: "object"
                fields:
                  - { label: "Titel", name: "titel", widget: "string" }
                  - { label: "Tekst", name: "tekst", widget: "text" }

          - label: "Wat je ontvangt (lijst)"
            name: "ontvangt"
            widget: "list"
            field: { label: "Onderdeel", name: "item", widget: "string" }

          - label: "Investering"
            name: "investering"
            widget: "object"
            fields:
              - { label: "Prijs (bijv. € 1.250)", name: "prijs", widget: "string" }
              - { label: "Tekst over termijnen", name: "termijnen", widget: "text" }

          - label: "Je bent klaar als je... (lijst)"
            name: "klaar"
            widget: "list"
            field: { label: "Punt", name: "item", widget: "string" }

          - label: "Kennismaken (onderaan)"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Titel", name: "titel", widget: "string" }
              - { label: "Tekst", name: "tekst", widget: "text" }
              - { label: "E-mailadres", name: "email", widget: "string" }
